<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Repair Admin Login - UPKK SmartKids</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif;background:#f5fff8;padding:24px;color:#10231a}
    .box{max-width:560px;margin:auto;background:#fff;border:1px solid #d9f2e3;border-radius:18px;padding:22px;box-shadow:0 12px 30px rgba(0,0,0,.08)}
    input,button{width:100%;padding:12px;border-radius:10px;border:1px solid #cbd5e1;margin:7px 0 14px;font-size:15px}
    button{background:#16a34a;color:white;border:0;font-weight:800;cursor:pointer}
    .msg{white-space:pre-wrap;background:#f1f5f9;border-radius:10px;padding:12px}
  </style>
</head>
<body>
<div class="box">
  <h1>Repair Admin Login</h1>
  <p>Guna page ini jika admin login belum wujud dalam Firebase.</p>
  <label>Admin ID</label>
  <input id="adminId" value="superadmin">
  <label>Password</label>
  <input id="password" value="Admin123!">
  <button onclick="repair()">Create / Reset Admin</button>
  <div id="msg" class="msg">Sedia.</div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js?v=1.43"></script>
<script>
firebase.initializeApp(window.UPKK_FIREBASE_CONFIG);
const db = firebase.database();
const APP_ROOT = 'apps/UPKK';
const $ = id => document.getElementById(id);
const safeKey = s => String(s||'').trim().toLowerCase().replace(/[.#$\[\]\/]/g,'-');
async function sha256(text){
  const data = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2,'0')).join('');
}
async function repair(){
  try{
    const adminId = safeKey($('adminId').value);
    const password = $('password').value;
    if(!adminId || !password) throw new Error('Isi Admin ID dan password.');
    const passwordHash = await sha256(password);
    const now = new Date().toISOString();
    await db.ref(APP_ROOT + '/adminAccounts/' + adminId).set({
      adminId,
      username: adminId,
      role: 'admin',
      name: adminId === 'superadmin' ? 'Super Admin' : 'Admin',
      status: 'active',
      passwordHash,
      createdAt: now,
      updatedAt: now
    });
    await db.ref(APP_ROOT + '/adminLogs').push({action:'repair_admin_account', adminId, at:now});
    $('msg').textContent = 'Berjaya create/reset admin.\n\nLogin di admin-login.html\nID: ' + adminId + '\nPassword: ' + password;
  }catch(err){
    console.error(err);
    $('msg').textContent = 'Gagal: ' + err.message;
  }
}
</script>
</body>
</html>
